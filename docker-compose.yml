services:
  ida-telegram-mcp:
    image: ghcr.io/${GITHUB_OWNER:-l8tenever}/ida-telegram:${IMAGE_TAG:-latest}
    container_name: ida-telegram-mcp
    restart: unless-stopped

    # Nur auf localhost binden: von aussen ist der Port NICHT erreichbar,
    # nur der auf demselben Server laufende cloudflared-Tunnel kann ihn
    # ansprechen. Absicherung nach aussen passiert zusaetzlich per Token
    # (siehe MCP_AUTH_TOKEN) direkt in der Anwendung. Standardport 4567,
    # damit es neben Ida-Untis (8000) auf demselben Server laufen kann.
    ports:
      - "127.0.0.1:${MCP_PORT:-4567}:4567"

    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?Bitte TELEGRAM_BOT_TOKEN in .env setzen}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:?Bitte TELEGRAM_CHAT_ID in .env setzen}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:?Bitte MCP_AUTH_TOKEN in .env setzen}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 4567
      # Automatisches Antworten -- ROUTINE_ID/ROUTINE_API_KEY werden nur
      # validiert, wenn AUTOREPLY_ENABLED=true ist (siehe app/config.py).
      AUTOREPLY_ENABLED: ${AUTOREPLY_ENABLED:-true}
      ROUTINE_ID: ${ROUTINE_ID:-}
      ROUTINE_API_KEY: ${ROUTINE_API_KEY:-}
      AUTOREPLY_DEBOUNCE_SECONDS: ${AUTOREPLY_DEBOUNCE_SECONDS:-3}
      MEMORY_FILE_PATH: /data/memory.md

    # Persistiert das Gedaechtnis-File (gedaechtnis_lesen/gedaechtnis_schreiben)
    # ueber Neustarts/Recreates hinweg -- anders als /tmp bleibt das erhalten.
    volumes:
      - ida-telegram-memory:/data

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4567/healthz', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Sicherheits-Haertung: kein root im Container (siehe Dockerfile),
    # keine neuen Privilegien, alle Linux-Capabilities entfernt, Dateisystem
    # read-only (nur /tmp fuer temporaere Dateien und das /data-Volume oben
    # fuer das Gedaechtnis-File sind beschreibbar).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ida-telegram-memory:
