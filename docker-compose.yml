services:
  ida-telegram-mcp:
    image: ghcr.io/${GITHUB_OWNER:-l8tenever}/ida-telegram:${IMAGE_TAG:-latest}
    container_name: ida-telegram-mcp
    restart: unless-stopped

    # Bind-IP 10.7.0.1 (nicht 127.0.0.1): nur so kann der auf diesem Host
    # separat laufende cloudflared-Container den Port erreichen -- passend
    # zum bestehenden Netzwerk-Setup (siehe auch Ida-Google/Ida-Untis).
    # Standardport 4567, damit es neben Ida-Untis (8000) auf demselben
    # Server laufen kann.
    ports:
      - "10.7.0.1:${MCP_PORT:-4567}:4567"

    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?Bitte TELEGRAM_BOT_TOKEN in .env setzen}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:?Bitte TELEGRAM_CHAT_ID in .env setzen}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:?Bitte MCP_AUTH_TOKEN in .env setzen}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 4567
      # Automatisches Antworten -- ROUTINE_ID/ROUTINE_API_KEY werden nur
      # validiert, wenn AUTOREPLY_ENABLED=true ist (siehe app/config.py).
      AUTOREPLY_ENABLED: ${AUTOREPLY_ENABLED:-true}
      ROUTINE_ID: ${ROUTINE_ID:-}
      ROUTINE_API_KEY: ${ROUTINE_API_KEY:-}
      AUTOREPLY_DEBOUNCE_SECONDS: ${AUTOREPLY_DEBOUNCE_SECONDS:-3}
      CHAT_HISTORY_LENGTH: ${CHAT_HISTORY_LENGTH:-5}
      # Lokale Sprachnachrichten-Transkription (faster-whisper, laeuft in
      # diesem Container). WHISPER_MODEL: tiny/base/small/medium/large-v3 --
      # groesser = genauer, aber langsamer/mehr RAM auf einer CPU-VPS.
      WHISPER_ENABLED: ${WHISPER_ENABLED:-true}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_MODEL_CACHE: /data/whisper-models
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-de}

    volumes:
      - ida-telegram-whisper-models:/data

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4567/healthz', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Sicherheits-Haertung: kein root im Container (siehe Dockerfile),
    # keine neuen Privilegien, alle Linux-Capabilities entfernt, Dateisystem
    # read-only (nur /tmp beschreibbar fuer temporaere Dateien, /data ueber
    # das benannte Volume fuer den dauerhaften Whisper-Modell-Cache).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ida-telegram-whisper-models:
